<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Financeiro - Studio</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; }
    header { background: #1a1a2e; padding: 20px 30px; display: flex; align-items: center; gap: 15px; border-bottom: 2px solid #e94560; }
    header h1 { font-size: 1.4rem; color: #fff; }
    header span { font-size: 0.85rem; color: #aaa; }
    .filters { display: flex; gap: 12px; padding: 20px 30px; flex-wrap: wrap; background: #121212; border-bottom: 1px solid #222; }
    .filters select { background: #1e1e1e; color: #e0e0e0; border: 1px solid #333; padding: 8px 12px; border-radius: 6px; font-size: 0.9rem; cursor: pointer; }
    .filters select:focus { outline: none; border-color: #e94560; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; padding: 20px 30px; }
    .card { background: #1e1e1e; border-radius: 10px; padding: 18px; border-left: 4px solid #e94560; }
    .card.receita { border-left-color: #00c853; }
    .card.despesa { border-left-color: #e94560; }
    .card.saldo { border-left-color: #2979ff; }
    .card.pendente { border-left-color: #ff9100; }
    .card h3 { font-size: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .card p { font-size: 1.4rem; font-weight: 700; }
    .card.receita p { color: #00c853; }
    .card.despesa p { color: #e94560; }
    .card.saldo p { color: #2979ff; }
    .card.pendente p { color: #ff9100; }
    .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; padding: 0 30px 20px; }
    .chart-box { background: #1e1e1e; border-radius: 10px; padding: 20px; }
    .chart-box h3 { font-size: 0.85rem; color: #aaa; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
    .table-wrap { padding: 0 30px 40px; }
    .table-wrap h3 { font-size: 0.85rem; color: #aaa; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    thead tr { background: #2a2a2a; }
    th { padding: 10px 12px; text-align: left; color: #aaa; font-weight: 600; }
    tbody tr { border-bottom: 1px solid #222; transition: background 0.2s; }
    tbody tr:hover { background: #252525; }
    td { padding: 9px 12px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
    .badge.receita { background: #00c85322; color: #00c853; }
    .badge.despesa { background: #e9456022; color: #e94560; }
    .badge.efetivado { background: #2979ff22; color: #2979ff; }
    .badge.pendente { background: #ff910022; color: #ff9100; }
    #loading { text-align: center; padding: 60px; font-size: 1rem; color: #aaa; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>📊 Dashboard Financeiro</h1>
    <span id="ultima-atualizacao">Carregando...</span>
  </div>
</header>

<div class="filters">
  <select id="filtro-mes"><option value="">Todos os meses</option></select>
  <select id="filtro-categoria"><option value="">Todas as categorias</option></select>
  <select id="filtro-grupo"><option value="">Todos os grupos</option></select>
  <select id="filtro-status"><option value="">Todos os status</option></select>
</div>

<div id="loading">Carregando dados...</div>

<div id="conteudo" style="display:none">
  <div class="cards">
    <div class="card receita"><h3>Total Receitas</h3><p id="total-receitas">-</p></div>
    <div class="card despesa"><h3>Total Despesas</h3><p id="total-despesas">-</p></div>
    <div class="card saldo"><h3>Saldo Líquido</h3><p id="saldo-liquido">-</p></div>
    <div class="card pendente"><h3>Pendentes</h3><p id="total-pendentes">-</p></div>
  </div>

  <div class="charts">
    <div class="chart-box"><h3>Receitas x Despesas por Mês</h3><canvas id="chart-mensal"></canvas></div>
    <div class="chart-box"><h3>Despesas por Grupo</h3><canvas id="chart-grupos"></canvas></div>
  </div>

  <div class="table-wrap">
    <h3>Lançamentos</h3>
    <table>
      <thead>
        <tr>
          <th>Data</th>
          <th>Descrição</th>
          <th>Categoria</th>
          <th>Grupo</th>
          <th>Subgrupo</th>
          <th>Banco</th>
          <th>Status</th>
          <th>Valor</th>
        </tr>
      </thead>
      <tbody id="tabela-body"></tbody>
    </table>
  </div>
</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbxA2Se7pS5o2TZncfCJDtA3UA1jeesG9b5HDm7Wep1YRScfwWp4E1j7LXMxNEiVEQAh/exec';

  let dadosOriginais = [];
  let chartMensal, chartGrupos;

  const fmt = v => 'R$ ' + parseFloat(v).toLocaleString('pt-BR', { minimumFractionDigits: 2 });

  async function carregarDados() {
    try {
      const res = await fetch(API_URL);
      const json = await res.json();
      dadosOriginais = json.rows || [];
      document.getElementById('ultima-atualizacao').textContent = 'Atualizado em ' + new Date().toLocaleString('pt-BR');
      popularFiltros();
      renderizar();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('conteudo').style.display = 'block';
    } catch (e) {
      document.getElementById('loading').textContent = 'Erro ao carregar dados. Verifique a URL do Apps Script.';
    }
  }

  function popularFiltros() {
    const meses = [...new Set(dadosOriginais.map(r => r.MES))];
    const categorias = [...new Set(dadosOriginais.map(r => r.CATEGORIA))];
    const grupos = [...new Set(dadosOriginais.map(r => r.GRUPO))];
    const status = [...new Set(dadosOriginais.map(r => r.STATUS))];

    const ordemMes = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    meses.sort((a,b) => ordemMes.indexOf(a) - ordemMes.indexOf(b));

    preencher('filtro-mes', meses);
    preencher('filtro-categoria', categorias);
    preencher('filtro-grupo', grupos);
    preencher('filtro-status', status);
  }

  function preencher(id, valores) {
    const sel = document.getElementById(id);
    valores.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v; opt.textContent = v.charAt(0).toUpperCase() + v.slice(1);
      sel.appendChild(opt);
    });
    sel.addEventListener('change', renderizar);
  }

  function filtrados() {
    const mes = document.getElementById('filtro-mes').value;
    const cat = document.getElementById('filtro-categoria').value;
    const grp = document.getElementById('filtro-grupo').value;
    const sts = document.getElementById('filtro-status').value;
    return dadosOriginais.filter(r =>
      (!mes || r.MES === mes) &&
      (!cat || r.CATEGORIA === cat) &&
      (!grp || r.GRUPO === grp) &&
      (!sts || r.STATUS === sts)
    );
  }

  function renderizar() {
    const dados = filtrados();

    const receitas = dados.filter(r => r.CATEGORIA === 'RECEITA').reduce((s, r) => s + r.VALOR, 0);
    const despesas = dados.filter(r => r.CATEGORIA === 'DESPESA').reduce((s, r) => s + r.VALOR, 0);
    const pendentes = dados.filter(r => r.STATUS === 'PENDENTE').reduce((s, r) => s + r.VALOR, 0);

    document.getElementById('total-receitas').textContent = fmt(receitas);
    document.getElementById('total-despesas').textContent = fmt(despesas);
    document.getElementById('saldo-liquido').textContent = fmt(receitas - despesas);
    document.getElementById('total-pendentes').textContent = fmt(pendentes);

    renderTabela(dados);
    renderChartMensal(dados);
    renderChartGrupos(dados);
  }

  function renderTabela(dados) {
    const tbody = document.getElementById('tabela-body');
    tbody.innerHTML = '';
    dados.slice().sort((a,b) => new Date(b.DATA) - new Date(a.DATA)).forEach(r => {
      const tr = document.createElement('tr');
      const data = new Date(r.DATA).toLocaleDateString('pt-BR');
      tr.innerHTML = `
        <td>${data}</td>
        <td>${r.DESCRICAO}</td>
        <td><span class="badge ${r.CATEGORIA.toLowerCase()}">${r.CATEGORIA}</span></td>
        <td>${r.GRUPO}</td>
        <td>${r.SUBGRUPO}</td>
        <td>${r.BANCO}</td>
        <td><span class="badge ${r.STATUS.toLowerCase()}">${r.STATUS}</span></td>
        <td style="color:${r.CATEGORIA==='RECEITA'?'#00c853':'#e94560'};font-weight:600">${fmt(r.VALOR)}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function renderChartMensal(dados) {
    const ordemMes = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    const meses = [...new Set(dados.map(r => r.MES))].sort((a,b) => ordemMes.indexOf(a) - ordemMes.indexOf(b));
    const rec = meses.map(m => dados.filter(r => r.MES===m && r.CATEGORIA==='RECEITA').reduce((s,r)=>s+r.VALOR,0));
    const desp = meses.map(m => dados.filter(r => r.MES===m && r.CATEGORIA==='DESPESA').reduce((s,r)=>s+r.VALOR,0));

    if (chartMensal) chartMensal.destroy();
    chartMensal = new Chart(document.getElementById('chart-mensal'), {
      type: 'bar',
      data: {
        labels: meses,
        datasets: [
          { label: 'Receitas', data: rec, backgroundColor: '#00c85388' },
          { label: 'Despesas', data: desp, backgroundColor: '#e9456088' }
        ]
      },
      options: { plugins: { legend: { labels: { color: '#ccc' } } }, scales: { x: { ticks: { color: '#aaa' } }, y: { ticks: { color: '#aaa' } } } }
    });
  }

  function renderChartGrupos(dados) {
    const desp = dados.filter(r => r.CATEGORIA === 'DESPESA');
    const grupos = {};
    desp.forEach(r => { grupos[r.GRUPO] = (grupos[r.GRUPO] || 0) + r.VALOR; });
    const labels = Object.keys(grupos);
    const values = Object.values(grupos);
    const cores = ['#e94560','#2979ff','#ff9100','#00c853','#aa00ff','#00bcd4','#ff5252','#ffd740'];

    if (chartGrupos) chartGrupos.destroy();
    chartGrupos = new Chart(document.getElementById('chart-grupos'), {
      type: 'doughnut',
      data: { labels, datasets: [{ data: values, backgroundColor: cores }] },
      options: { plugins: { legend: { labels: { color: '#ccc' } } } }
    });
  }

  carregarDados();
</script>
</body>
</html>
