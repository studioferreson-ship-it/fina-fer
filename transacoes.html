<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Transações - Fina Fer</title>
    <style>
        :root {
            --bg-dark: #0d1117;
            --card-bg: #161b27;
            --border-color: #1e2535;
            --text-color: #e0e0e0;
            --text-muted: #555;
            --primary-color: #7c6cf7;
            --success-color: #4ade80;
            --error-color: #f87171;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text-color);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 20px;
        }
        h1 span { color: var(--primary-color); }
        .card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text-color);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary-color);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        .btn {
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #6a5cdb; /* Slightly darker primary */
        }
        .btn-secondary {
            background: var(--border-color);
            color: var(--text-muted);
        }
        .btn-secondary:hover {
            background: #2a2d3e;
        }
        .message {
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none; /* Hidden by default */
        }
        .message.success {
            background: rgba(74, 222, 128, 0.2);
            color: var(--success-color);
            border: 1px solid var(--success-color);
        }
        .message.error {
            background: rgba(248, 113, 113, 0.2);
            color: var(--error-color);
            border: 1px solid var(--error-color);
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: var(--text-color);
            font-size: 1.2rem;
            gap: 10px;
        }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Grid de Transações */
        .transactions-grid {
            margin-top: 20px;
            overflow-x: auto;
        }
        .transactions-grid h2 {
            font-size: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
        }
        .transactions-grid table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .transactions-grid th,
        .transactions-grid td {
            padding: 10px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap; /* Evita quebra de linha em células */
        }
        .transactions-grid th {
            background: var(--bg-dark);
            color: var(--text-muted);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: sticky;
            top: 0;
        }
        .transactions-grid tbody tr:hover {
            background: #1a2030;
        }
        .transactions-grid td:last-child {
            text-align: right;
            font-weight: 600;
            color: var(--text-color);
        }
        .transactions-grid .value-positive { color: var(--success-color); }
        .transactions-grid .value-negative { color: var(--error-color); }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .transactions-grid th,
            .transactions-grid td {
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
        <span>Carregando dados...</span>
    </div>

    <div class="container">
        <h1>Gerenciar <span>Transações</span></h1>

        <div class="card">
            <h2>Nova Transação</h2>
            <form id="transaction-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="data">Data</label>
                        <input type="date" id="data" name="DATA" required>
                    </div>
                    <div class="form-group">
                        <label for="data_comp">Data Comp.</label>
                        <input type="date" id="data_comp" name="DATA COMP">
                    </div>
                    <div class="form-group">
                        <label for="descricao">Descrição</label>
                        <input type="text" id="descricao" name="DESCRICAO" required>
                    </div>
                    <div class="form-group">
                        <label for="categoria">Categoria</label>
                        <select id="categoria" name="CATEGORIA" required></select>
                    </div>
                    <div class="form-group">
                        <label for="grupo">Grupo</label>
                        <select id="grupo" name="GRUPO" required></select>
                    </div>
                    <div class="form-group">
                        <label for="subgrupo">Subgrupo</label>
                        <select id="subgrupo" name="SUBGRUPO"></select>
                    </div>
                    <div class="form-group">
                        <label for="tipo_pgto">Tipo Pgto</label>
                        <select id="tipo_pgto" name="TIPO PGTO"></select>
                    </div>
                    <div class="form-group">
                        <label for="banco">Banco</label>
                        <select id="banco" name="BANCO"></select>
                    </div>
                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status" name="STATUS"></select>
                    </div>
                    <div class="form-group">
                        <label for="valor">Valor</label>
                        <input type="number" id="valor" name="VALOR" step="0.01" required>
                    </div>
                    <div class="form-group" style="grid-column: span 1 / -1;">
                        <label for="obs">Observações</label>
                        <textarea id="obs" name="OBS"></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="clearForm()">Limpar</button>
                    <button type="submit" class="btn">Salvar Transação</button>
                </div>
                <div id="form-message" class="message"></div>
            </form>
        </div>

        <div class="card transactions-grid">
            <h2>Transações Recentes</h2>
            <table>
                <thead>
                    <tr>
                        <th>Mês</th>
                        <th>Data</th>
                        <th>Descrição</th>
                        <th>Categoria</th>
                        <th>Grupo</th>
                        <th>Subgrupo</th>
                        <th>Tipo Pgto</th>
                        <th>Banco</th>
                        <th>Status</th>
                        <th>Valor</th>
                        <th>Obs</th>
                    </tr>
                </thead>
                <tbody id="transactions-table-body">
                    <tr><td colspan="11" style="text-align: center; color: var(--text-muted);">Nenhuma transação encontrada.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // ATUALIZE ESTA URL COM A URL DA NOVA IMPLANTAÇÃO DO SEU Apps Script (transacoes_api.gs)
        const API_URL_TRANSACTIONS = 'https://script.google.com/macros/s/AKfycbxSRPcDWJSp-6FDcXFcNT-PymOtFIB8BfkDmWoa6rZHCGqd-qmov5ScnevJhAXX03TV/exec';

        const MES_NM = {
            'jan': 'Janeiro', 'fev': 'Fevereiro', 'mar': 'Março', 'abr': 'Abril',
            'mai': 'Maio', 'jun': 'Junho', 'jul': 'Julho', 'ago': 'Agosto',
            'set': 'Setembro', 'out': 'Outubro', 'nov': 'Novembro', 'dez': 'Dezembro'
        };

        document.addEventListener('DOMContentLoaded', init);

        async function init() {
            showLoading(true);
            try {
                const response = await fetch(API_URL_TRANSACTIONS);
                const data = await response.json();

                if (data.error) {
                    displayMessage('error', 'Erro ao carregar dados: ' + data.error);
                    return;
                }

                populateDropdowns(data.dropdowns);
                renderTransactions(data.transactions);

            } catch (error) {
                displayMessage('error', 'Erro ao conectar com a API: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        function populateDropdowns(dropdowns) {
            const dropdownMap = {
                'CATEGORIA': 'categoria',
                'GRUPO': 'grupo',
                'SUBGRUPO': 'subgrupo',
                'TIPO PGTO': 'tipo_pgto',
                'BANCO': 'banco',
                'STATUS': 'status'
            };

            for (const key in dropdownMap) {
                const selectElement = document.getElementById(dropdownMap[key]);
                if (selectElement) {
                    selectElement.innerHTML = '<option value="">Selecione...</option>'; // Default option
                    if (dropdowns[key]) {
                        dropdowns[key].forEach(item => {
                            const option = document.createElement('option');
                            option.value = item;
                            option.textContent = item;
                            selectElement.appendChild(option);
                        });
                    }
                }
            }
        }

        function renderTransactions(transactions) {
            const tbody = document.getElementById('transactions-table-body');
            tbody.innerHTML = ''; // Clear existing rows

            if (!transactions || transactions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="11" style="text-align: center; color: var(--text-muted);">Nenhuma transação encontrada.</td></tr>';
                return;
            }

            // Sort transactions by date (assuming 'DATA' is in 'DD/MM' or 'YYYY-MM-DD' format)
            // For 'DD/MM' format, we need to infer the year or use a placeholder for sorting.
            // Let's assume 'DATA' is 'DD/MM' and 'DATA COMP' is 'YYYY-MM-DD' if available.
            // We'll prioritize 'DATA COMP' for sorting if it exists and is a valid date.
            const sortedTransactions = transactions.sort((a, b) => {
                const getDateValue = (row) => {
                    const dateComp = row['DATA COMP'];
                    const date = row['DATA'];
                    let d = null;

                    if (dateComp && typeof dateComp === 'string' && dateComp.match(/
^
\d{4}-\d{2}-\d{2}
$
/)) {
                        d = new Date(dateComp + 'T00:00:00'); // Assume UTC to avoid timezone issues
                    } else if (date && typeof date === 'string' && date.match(/
^
\d{2}\/\d{2}
$
/)) {
                        const [day, month] = date.split('/');
                        d = new Date(new Date().getFullYear(), parseInt(month) - 1, parseInt(day)); // Use current year
                    } else if (date instanceof Date) {
                        d = date;
                    }
                    return d ? d.getTime() : 0; // Return timestamp or 0 for invalid dates
                };

                const dateA = getDateValue(a);
                const dateB = getDateValue(b);

                return dateB - dateA; // Descending order (most recent first)
            });


            sortedTransactions.forEach(t => {
                const row = document.createElement('tr');
                const valorClass = t.VALOR >= 0 ? 'value-positive' : 'value-negative';
                const mesDisplay = MES_NM[String(t.MES).toLowerCase()] || t.MES || '—';

                row.innerHTML = `
                    <td>${mesDisplay}</td>
                    <td>${t.DATA || '—'}</td>
                    <td>${t.DESCRICAO || '—'}</td>
                    <td>${t.CATEGORIA || '—'}</td>
                    <td>${t.GRUPO || '—'}</td>
                    <td>${t.SUBGRUPO || '—'}</td>
                    <td>${t['TIPO PGTO'] || '—'}</td>
                    <td>${t.BANCO || '—'}</td>
                    <td>${t.STATUS || '—'}</td>
                    <td class="${valorClass}">${formatCurrency(t.VALOR)}</td>
                    <td>${t.OBS || '—'}</td>
                `;
                tbody.appendChild(row);
            });
        }

        document.getElementById('transaction-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            showLoading(true, 'Salvando transação...');
            const form = event.target;
            const formData = new FormData(form);
            const payload = {};

            for (const [key, value] of formData.entries()) {
                // Convert value to number if it's the 'VALOR' field
                if (key === 'VALOR') {
                    payload[key.toUpperCase()] = parseFloat(value);
                } else {
                    payload[key.toUpperCase()] = value.trim();
                }
            }

            try {
                const response = await fetch(API_URL_TRANSACTIONS, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.success) {
                    displayMessage('success', result.message);
                    form.reset(); // Clear form after successful submission
                    // Re-fetch data to update the grid
                    init();
                } else {
                    displayMessage('error', 'Erro ao salvar: ' + result.error);
                }
            } catch (error) {
                displayMessage('error', 'Erro de conexão ao salvar: ' + error.message);
            } finally {
                showLoading(false);
            }
        });

        function clearForm() {
            document.getElementById('transaction-form').reset();
            displayMessage('clear');
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(value);
        }

        function displayMessage(type, message = '') {
            const msgElement = document.getElementById('form-message');
            msgElement.style.display = 'none';
            msgElement.className = 'message'; // Reset classes

            if (type === 'success') {
                msgElement.classList.add('success');
                msgElement.textContent = message;
                msgElement.style.display = 'block';
            } else if (type === 'error') {
                msgElement.classList.add('error');
                msgElement.textContent = message;
                msgElement.style.display = 'block';
            }
            // If type is 'clear' or anything else, it just hides the message
        }

        function showLoading(show, text = 'Carregando dados...') {
            const overlay = document.getElementById('loading-overlay');
            const loadingText = overlay.querySelector('span');
            if (show) {
                loadingText.textContent = text;
                overlay.style.display = 'flex';
            } else {
                overlay.style.display = 'none';
            }
        }
    </script>
</body>
</html>
